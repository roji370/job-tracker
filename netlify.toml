[build]
  base      = "frontend"
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy all /api/* calls to the Render backend.
# ⚠️  REPLACE the URL below with your actual Render backend URL.
#    It looks like: https://YOUR-SERVICE-NAME.onrender.com
[[redirects]]
  from   = "/api/*"
  to     = "https://job-tracker-1-hvss.onrender.com/api/:splat"
  status = 200
  force  = true

# React Router SPA fallback — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
